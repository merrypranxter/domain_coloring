<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>domain_coloring · minimal</title>
<!--
  The whole idea in ~90 lines, zero dependencies, shaders inlined so it runs
  straight off the filesystem (double-click — no server needed). This is the
  teaching version of the main app: one function, HSV coloring, no presets.
  Edit the `f(z)` body in the fragment shader and reload.
-->
<style>html,body{margin:0;height:100%;background:#000}canvas{display:block;width:100vw;height:100vh}</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const gl = document.getElementById('c').getContext('webgl2');

const VERT = `#version 300 es
out vec2 uv;
void main(){
  vec2 p = vec2((gl_VertexID<<1)&2, gl_VertexID&2);
  uv = p; gl_Position = vec4(p*2.0-1.0,0.0,1.0);
}`;

const FRAG = `#version 300 es
precision highp float;
in vec2 uv; out vec4 o;
uniform vec2 res;
const float TAU = 6.28318530718;

vec2 cmul(vec2 a, vec2 b){ return vec2(a.x*b.x-a.y*b.y, a.x*b.y+a.y*b.x); }
vec2 cpow(vec2 z, float n){ float r=length(z), t=atan(z.y,z.x); return pow(r,n)*vec2(cos(n*t),sin(n*t)); }
vec3 hsv(vec3 c){ vec3 p=abs(fract(c.x+vec3(0.,2./3.,1./3.))*6.-3.); return c.z*mix(vec3(1.),clamp(p-1.,0.,1.),c.y); }

// ── the only line that matters: where does this pixel go? ──
vec2 f(vec2 z){ return cpow(z, 3.0) - vec2(1.0, 0.0); }   // z^3 − 1

void main(){
  float a = res.x/res.y;
  vec2 z = (uv-0.5)*vec2(a,1.0)*4.0;     // pixel → complex plane, zoom 4
  vec2 w = f(z);
  float hue = atan(w.y,w.x)/TAU + 0.5;   // phase → hue
  float L = 0.5 + 0.5*tanh(0.3*log2(length(w)+1e-9)); // |w| → brightness
  o = vec4(hsv(vec3(hue, 0.9, L)), 1.0);
}`;

function sh(type, src){
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw gl.getShaderInfoLog(s);
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, sh(gl.VERTEX_SHADER, VERT));
gl.attachShader(prog, sh(gl.FRAGMENT_SHADER, FRAG));
gl.linkProgram(prog);
gl.useProgram(prog);
gl.bindVertexArray(gl.createVertexArray());
const uRes = gl.getUniformLocation(prog, 'res');

function frame(){
  const c = gl.canvas, d = Math.min(devicePixelRatio||1, 2);
  c.width = innerWidth*d|0; c.height = innerHeight*d|0;
  gl.viewport(0,0,c.width,c.height);
  gl.uniform2f(uRes, c.width, c.height);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
